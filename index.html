<!DOCTYPE html>
<html lang="uz">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hosil Bozor</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Hosil.uz</h1>

<div class="auth">

<button id="loginBtn" onclick="openLogin()">Login</button>

<button id="registerBtn" onclick="openRegister()">Register</button>

<span id="user"></span>

<button id="logoutBtn" onclick="logout()" style="display:none">Logout</button>

<button id="adminBtn" onclick="openAdmin()" style="display:none">Admin</button>

</div>

</header>


<section>

<h2>Mahsulotlar</h2>

<select id="regionFilter" onchange="filterRegion()">

<option value="">Barcha viloyat</option>

<option>Andijon</option>
<option>Buxoro</option>
<option>Farg'ona</option>
<option>Jizzax</option>
<option>Xorazm</option>
<option>Namangan</option>
<option>Navoiy</option>
<option>Qashqadaryo</option>
<option>Samarqand</option>
<option>Sirdaryo</option>
<option>Surxondaryo</option>
<option>Toshkent</option>

</select>

<div id="products"></div>

</section>


<section>

<h2>🚛 Transport</h2>

<div class="transport-add">

<input id="from" placeholder="Qayerdan">

<input id="to" placeholder="Qayerga">

<input id="truckPhone" placeholder="telefon">

<button onclick="addTruck()">Qo'shish</button>

</div>

<div id="trucks"></div>

</section>


<button class="fab" onclick="openAdd()">+</button>


<!-- LOGIN -->

<div id="loginModal" class="modal">

<div class="modal-content">

<h3>Login</h3>

<input id="loginUser" placeholder="username">

<input id="loginPass" type="password" placeholder="password">

<button onclick="login()">Login</button>

<button onclick="closeModal()">Yopish</button>

</div>

</div>


<!-- REGISTER -->

<div id="registerModal" class="modal">

<div class="modal-content">

<h3>Register</h3>

<input id="regUser" placeholder="username">

<input id="regPass" type="password" placeholder="password">

<button onclick="register()">Register</button>

<button onclick="closeModal()">Yopish</button>

</div>

</div>


<!-- ADD PRODUCT -->

<div id="addModal" class="modal">

<div class="modal-content">

<h3>E'lon joylash</h3>

<input id="name" placeholder="Mahsulot">

<input id="amount" placeholder="tonna">

<input id="price" placeholder="so'm/kg">

<input id="phone" placeholder="telefon">

<select id="region">

<option>Andijon</option>
<option>Buxoro</option>
<option>Farg'ona</option>
<option>Jizzax</option>
<option>Xorazm</option>
<option>Namangan</option>
<option>Navoiy</option>
<option>Qashqadaryo</option>
<option>Samarqand</option>
<option>Sirdaryo</option>
<option>Surxondaryo</option>
<option>Toshkent</option>

</select>

<button onclick="addProduct()">Qo'shish</button>

<button onclick="closeModal()">Yopish</button>

</div>

</div>


<!-- ADMIN -->

<div id="adminModal" class="modal">

<div class="modal-content">

<h3>Admin panel</h3>

<div id="adminProducts"></div>

<button onclick="closeModal()">Yopish</button>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
