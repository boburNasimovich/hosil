<!DOCTYPE html>
<html lang="uz">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hosil Bozor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header class="navbar">

        <div class="logo">
            <i class="fa-solid fa-leaf"></i> Hosil.uz
        </div>
       
        <div class="search-box">

            <input id="searchInput" placeholder="Mahsulot qidirish...">

            <button onclick="searchProduct()">
                <i class="fa-solid fa-search"></i>
            </button>

        </div>
 <div class="auth">

            <button id="loginBtn" onclick="openLogin()">
                <i class="fa-solid fa-right-to-bracket"></i> Login
            </button>

            <button id="registerBtn" onclick="openRegister()">
                <i class="fa-solid fa-user-plus"></i> Register
            </button>

            <span id="user" style="color: #2e8b57;"></span>

            <button id="logoutBtn" onclick="logout()" style="display:none">
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>

            <button id="adminBtn" onclick="openAdmin()" style="display:none">
                <i class="fa-solid fa-gear"></i>
            </button>

        </div>


    </header>
    <div class="categories">

        <button onclick="filterCategory('Kartoshka')">Kartoshka</button>

        <button onclick="filterCategory('Piyoz')">Piyoz</button>

        <button onclick="filterCategory('Sabzi')">Sabzi</button>

        <button onclick="filterCategory('Karam')">Karam</button>

        <button onclick="filterCategory('')">Barchasi</button>

    </div>

    <section>

        <h2>Mahsulotlar</h2>

        <select id="regionFilter" onchange="filterRegion()">

            <option value="">Barcha viloyat</option>

            <option>Andijon</option>
            <option>Buxoro</option>
            <option>Farg'ona</option>
            <option>Jizzax</option>
            <option>Xorazm</option>
            <option>Namangan</option>
            <option>Navoiy</option>
            <option>Qashqadaryo</option>
            <option>Samarqand</option>
            <option>Sirdaryo</option>
            <option>Surxondaryo</option>
            <option>Toshkent</option>

        </select>

        <div id="products"></div>

    </section>


    <section>

        <h2><i class="fa-solid fa-truck"></i> Transport</h2>

        <div class="transport-add">

            <input id="from" placeholder="Qayerdan">

            <input id="to" placeholder="Qayerga">

            <input id="truckPhone" placeholder="telefon">

            <button onclick="addTruck()">Qo'shish</button>

        </div>

        <div id="trucks"></div>

    </section>


    <button class="fab" onclick="openAdd()">+</button>


    <!-- LOGIN -->

    <div id="loginModal" class="modal">

        <div class="modal-content">

            <h3>Login</h3>

            <input id="loginUser" placeholder="username">

            <input id="loginPass" type="password" placeholder="password">

            <button onclick="login()">Login</button>

            <button onclick="closeModal()">Yopish</button>

        </div>

    </div>


    <!-- REGISTER -->

    <div id="registerModal" class="modal">

        <div class="modal-content">

            <h3>Register</h3>

            <input id="regUser" placeholder="username">

            <input id="regPass" type="password" placeholder="password">

            <button onclick="register()">Register</button>

            <button onclick="closeModal()">Yopish</button>

        </div>

    </div>


    <!-- ADD PRODUCT -->

    <div id="addModal" class="modal">

        <div class="modal-content">

            <h3>E'lon joylash</h3>

            <input id="name" placeholder="Mahsulot">

            <input id="amount" placeholder="tonna">

            <input id="price" placeholder="so'm/kg">

            <input id="phone" placeholder="telefon">

            <select id="region">

                <option>Andijon</option>
                <option>Buxoro</option>
                <option>Farg'ona</option>
                <option>Jizzax</option>
                <option>Xorazm</option>
                <option>Namangan</option>
                <option>Navoiy</option>
                <option>Qashqadaryo</option>
                <option>Samarqand</option>
                <option>Sirdaryo</option>
                <option>Surxondaryo</option>
                <option>Toshkent</option>

            </select>

            <button onclick="addProduct()">Qo'shish</button>

            <button onclick="closeModal()">Yopish</button>

        </div>

    </div>


    <!-- ADMIN -->

    <div id="adminModal" class="modal">

        <div class="modal-content">

            <h3>Admin panel</h3>

            <div id="adminProducts"></div>

            <button onclick="closeModal()">Yopish</button>

        </div>

    </div>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

    <script src="script.js"></script>
</body>

</html>
